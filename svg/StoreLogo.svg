<svg width="50" height="50" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="50" height="50" rx="8" fill="#1a1a2e" />
  
  <!-- Outer glow effect -->
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2" result="blur" />
    <feComposite in="SourceGraphic" in2="blur" operator="over" />
  </filter>
  
  <!-- Gradient for the D -->
  <linearGradient id="gradientD" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4a4ae6" />
    <stop offset="100%" stop-color="#7878ff" />
  </linearGradient>
  
  <!-- Stylized D -->
  <path d="M15 15 
           C15 15, 22 15, 25 15
           C32 15, 35 19, 35 25
           C35 31, 32 35, 25 35
           C22 35, 15 35, 15 35
           Z" 
        fill="url(#gradientD)" 
        filter="url(#glow)" />
  
  <!-- Inner cutout of D -->
  <path d="M19 19
           C19 19, 22 19, 24 19
           C28 19, 31 21, 31 25
           C31 29, 28 31, 24 31
           C22 31, 19 31, 19 31
           Z" 
        fill="#1a1a2e" />
  
  <!-- AI text -->
  <text x="25" y="42" 
        font-family="Arial, sans-serif" 
        font-weight="bold"
        font-size="8" 
        text-anchor="middle" 
        fill="#b24592" 
        filter="url(#glow)">AI</text>
</svg>
