<svg width="71" height="71" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="71" height="71" rx="10" fill="#1a1a2e" />
  
  <!-- Outer glow effect -->
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2" result="blur" />
    <feComposite in="SourceGraphic" in2="blur" operator="over" />
  </filter>
  
  <!-- Gradient for the D -->
  <linearGradient id="gradientD" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4a4ae6" />
    <stop offset="100%" stop-color="#7878ff" />
  </linearGradient>
  
  <!-- Stylized D -->
  <path d="M20 20 
           C20 20, 30 20, 35 20
           C45 20, 51 26, 51 35.5
           C51 45, 45 51, 35 51
           C30 51, 20 51, 20 51
           Z" 
        fill="url(#gradientD)" 
        filter="url(#glow)" />
  
  <!-- Inner cutout of D -->
  <path d="M26 26
           C26 26, 30 26, 34 26
           C40 26, 45 29, 45 35.5
           C45 42, 40 45, 34 45
           C30 45, 26 45, 26 45
           Z" 
        fill="#1a1a2e" />
  
  <!-- AI text -->
  <text x="35.5" y="60" 
        font-family="Arial, sans-serif" 
        font-weight="bold"
        font-size="12" 
        text-anchor="middle" 
        fill="#b24592" 
        filter="url(#glow)">AI</text>
</svg>
