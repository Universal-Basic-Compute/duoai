<svg width="44" height="44" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="44" height="44" rx="8" fill="#1a1a2e" />
  
  <!-- Outer glow effect -->
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2" result="blur" />
    <feComposite in="SourceGraphic" in2="blur" operator="over" />
  </filter>
  
  <!-- Gradient for the D -->
  <linearGradient id="gradientD" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4a4ae6" />
    <stop offset="100%" stop-color="#7878ff" />
  </linearGradient>
  
  <!-- Stylized D -->
  <path d="M12 11 
           C12 11, 19 11, 22 11
           C27 11, 31 15, 31 22
           C31 29, 27 33, 22 33
           C19 33, 12 33, 12 33
           Z" 
        fill="url(#gradientD)" 
        filter="url(#glow)" />
  
  <!-- Inner cutout of D -->
  <path d="M16 15
           C16 15, 19 15, 21 15
           C25 15, 27 17, 27 22
           C27 27, 25 29, 21 29
           C19 29, 16 29, 16 29
           Z" 
        fill="#1a1a2e" />
  
  <!-- AI text -->
  <text x="22" y="37" 
        font-family="Arial, sans-serif" 
        font-weight="bold"
        font-size="7" 
        text-anchor="middle" 
        fill="#b24592" 
        filter="url(#glow)">AI</text>
</svg>
