<svg width="620" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="620" height="300" fill="#1a1a2e" />
  
  <!-- Outer glow effect -->
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="10" result="blur" />
    <feComposite in="SourceGraphic" in2="blur" operator="over" />
  </filter>
  
  <!-- Gradient for the D -->
  <linearGradient id="gradientD" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4a4ae6" />
    <stop offset="100%" stop-color="#7878ff" />
  </linearGradient>
  
  <!-- Gradient for the AI -->
  <linearGradient id="gradientAI" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#e64a8c" />
    <stop offset="100%" stop-color="#ff78b4" />
  </linearGradient>
  
  <!-- Stylized D -->
  <path d="M200 100 
           C200 100, 240 100, 260 100
           C300 100, 320 120, 320 150
           C320 180, 300 200, 260 200
           C240 200, 200 200, 200 200
           Z" 
        fill="url(#gradientD)" 
        filter="url(#glow)" />
  
  <!-- Inner cutout of D -->
  <path d="M220 120
           C220 120, 240 120, 255 120
           C280 120, 300 130, 300 150
           C300 170, 280 180, 255 180
           C240 180, 220 180, 220 180
           Z" 
        fill="#1a1a2e" />
  
  <!-- AI text -->
  <text x="260" y="230" 
        font-family="Arial, sans-serif" 
        font-weight="bold"
        font-size="40" 
        text-anchor="middle" 
        fill="url(#gradientAI)" 
        filter="url(#glow)">AI</text>
        
  <!-- App Name -->
  <text x="400" y="150" 
        font-family="Arial, sans-serif" 
        font-weight="bold"
        font-size="48" 
        text-anchor="middle" 
        fill="white">DUOAI</text>
        
  <!-- Tagline -->
  <text x="400" y="190" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        text-anchor="middle" 
        fill="#9e9e9e">Your Intelligent Gaming Companion</text>
</svg>
