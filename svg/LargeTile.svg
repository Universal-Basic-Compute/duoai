<svg width="310" height="310" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="310" height="310" rx="30" fill="#1a1a2e" />
  
  <!-- Outer glow effect -->
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="8" result="blur" />
    <feComposite in="SourceGraphic" in2="blur" operator="over" />
  </filter>
  
  <!-- Gradient for the D -->
  <linearGradient id="gradientD" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4a4ae6" />
    <stop offset="100%" stop-color="#7878ff" />
  </linearGradient>
  
  <!-- Gradient for the AI -->
  <linearGradient id="gradientAI" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#e64a8c" />
    <stop offset="100%" stop-color="#ff78b4" />
  </linearGradient>
  
  <!-- Stylized D -->
  <path d="M85 85 
           C85 85, 130 85, 150 85
           C190 85, 225 120, 225 155
           C225 190, 190 225, 150 225
           C130 225, 85 225, 85 225
           Z" 
        fill="url(#gradientD)" 
        filter="url(#glow)" />
  
  <!-- Inner cutout of D -->
  <path d="M110 110
           C110 110, 130 110, 145 110
           C170 110, 200 125, 200 155
           C200 185, 170 200, 145 200
           C130 200, 110 200, 110 200
           Z" 
        fill="#1a1a2e" />
  
  <!-- AI text -->
  <text x="155" y="260" 
        font-family="Arial, sans-serif" 
        font-weight="bold"
        font-size="48" 
        text-anchor="middle" 
        fill="url(#gradientAI)" 
        filter="url(#glow)">AI</text>
        
  <!-- Tagline -->
  <text x="155" y="50" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        text-anchor="middle" 
        fill="white">GAMING COMPANION</text>
</svg>
